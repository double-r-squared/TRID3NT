# cloudbuild.yaml — Cloud Build pipeline for the GRACE-2 Python sandbox image.
#
# Sprint-13 Stage 2 / job-0232. Mirrors infra/modflow/cloudbuild.yaml +
# infra/sfincs/cloudbuild.yaml so all GRACE-2 worker/job images use the same
# build path: Cloud Build, AR repo `grace-2-containers`, region us-central1,
# linux/amd64-only (Cloud Build default builder).
#
# Why Cloud Build (not local `docker build`):
#   - The Debian dev box has no reachable docker daemon (socket permission
#     denied) and gcloud is not installed; Cloud Build runs inside GCP next to
#     Artifact Registry, so the image arrives in AR with zero local credential
#     surface.
#   - linux/amd64 only — matches the project-wide Linux-only substrate.
#
# Invocation (via Makefile `python-sandbox-build`):
#   gcloud builds submit --project=grace-2-hazard-prod \
#     --config=infra/python-sandbox/cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_AR_REPO=grace-2-containers,_IMAGE=grace-2-python-sandbox \
#     .
#
# Build context: repo root (`.`) so `COPY infra/python-sandbox/executor.py ...`
# in the Dockerfile pulls the harness from HEAD.
#
# Output: the image is tagged `:latest` AND the build's resolved digest is
# logged. The Cloud Run Job in infra/python-sandbox.tf pins to the digest (not
# :latest) for drift visibility — same discipline as infra/modflow.tf.
#
# NOTE: the sandbox image installs geopandas + rasterio + scikit-learn +
# matplotlib (GDAL/GEOS/PROJ wheels are large), so the first build is heavier than
# the SFINCS thin layer; subsequent builds hit the layer cache. The timeout below
# matches the MODFLOW image's 2400s.

substitutions:
  _REGION: us-central1
  _AR_REPO: grace-2-containers
  _IMAGE: grace-2-python-sandbox

steps:
  - id: build-python-sandbox
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE}:latest
      - --file=infra/python-sandbox/Dockerfile
      - .

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE}:latest

# E2_HIGHCPU_8 matches the qgis-server / sfincs / modflow sizing. The sandbox
# image installs the geospatial + ML wheel stack, so the first build is heavier
# than the SFINCS thin layer; subsequent builds hit the layer cache.
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

# 2400s (40 min) — matches the MODFLOW image to absorb the rasterio/GDAL +
# scikit-learn/scipy wheel install on a cold builder.
timeout: 2400s
