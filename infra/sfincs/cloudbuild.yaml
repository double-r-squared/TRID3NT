# cloudbuild.yaml — Cloud Build pipeline for the GRACE-2 SFINCS solver image.
#
# Mirrors infra/worker/cloudbuild.yaml so all GRACE-2 worker images use the
# same build path: Cloud Build, AR repo `grace-2-containers`, region
# us-central1, linux/amd64-only (Cloud Build default builder).
#
# Why Cloud Build (not local `docker build`):
#   - The Debian 13 dev box requires sudo for docker.sock; Cloud Build runs
#     inside GCP next to Artifact Registry, so the image arrives in AR with
#     zero local credential surface.
#   - linux/amd64 only — matches the project-wide Linux-only substrate
#     (PROJECT_STATE / sprint-03 decision).
#
# Invocation (via Makefile `sfincs-build`):
#   gcloud builds submit --project=grace-2-hazard-prod \
#     --config=infra/sfincs/cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_AR_REPO=grace-2-containers,_IMAGE=grace-2-sfincs-solver \
#     .
#
# Build context: repo root (`.`) so `COPY services/workers/sfincs/ ...` in
# the Dockerfile pulls the entrypoint shim from HEAD.
#
# Output: the image is tagged `:latest` AND the build's resolved digest is
# logged to the Cloud Build job. The Cloud Run Job in infra/sfincs.tf pins
# to the digest (not :latest) for the same drift-visibility reason
# job-0018 r1 / job-0021 adopted.

substitutions:
  _REGION: us-central1
  _AR_REPO: grace-2-containers
  _IMAGE: grace-2-sfincs-solver

steps:
  - id: build-sfincs-solver
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE}:latest
      - --file=services/workers/sfincs/Dockerfile
      - .

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE}:latest

# E2_HIGHCPU_8 matches job-0018/job-0021 sizing. The SFINCS base image is
# substantially lighter than qgis-server (no Qt/GDAL surface), so the first
# build is fast; subsequent builds hit the layer cache.
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
