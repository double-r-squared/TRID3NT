# GRACE-2 QGIS Server — custom nginx.conf (job-0029 / OQ-W-27-1 CORS fix).
#
# Replaces /etc/nginx/nginx.conf in the qgis/qgis-server 3.40 LTR image.
# The upstream file (qgis/qgis-docker server/conf/qgis-server-nginx.conf)
# emits NO CORS headers, and neither the FCGI mapserver nor the bundled
# nginx consult any env var to do so. PATH (a) attempted env-var-only fix
# (QGIS_SERVER_CORS_ALLOW_ORIGIN, QGIS_SERVER_ALLOW_HEADERS) — confirmed
# dead. This file is the PATH (b) fix: inject CORS headers in nginx
# directly on every response.
#
# Structure preserved 1:1 from the upstream config (same maps, same
# location blocks, same FCGI parameters); only diff is the CORS header
# block + preflight OPTIONS handling. This keeps behavior identical for
# everything else (WMS/WMTS/WFS/OGC-API routes) while making the service
# CORS-compatible with MapLibre/browser fetches.
#
# Origin scoping = `*` for M3 (dev posture). The QGIS Server response
# payload is map tiles, not credentialed user data; no cookies / auth in
# the request flow; origin-wildcard is safe pre-production. Revisit at
# M9/M10 production hosting once a stable web-origin lands.

user www-data;
worker_processes auto;
error_log stderr;
pid /run/nginx.pid;

# Load dynamic modules. See /usr/share/doc/nginx/README.dynamic.
include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    access_log  /dev/stdout;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    # Get 'host' from `$host` unless 'X-Forwarded-Host'
    # is set by the reverse proxy.
    # 'X-Forwarded-Host' may contain also the port,
    # so it is removed from the variable
    map $http_x_forwarded_host $qgis_host {
        "~(?<h>[^:]+)" $h;
        default $host;
    }
    # Get 'PORT' from `$http_host`
    map $http_host $port {
        "~*.*:(?<p>.*)" $p;
        default $server_port;
    }
    # Get 'HTTPS' status from `$https` unless 'X-Forwarded-Proto'
    # is set by the reverse proxy and contains 'https' scheme
    map $http_x_forwarded_proto $qgis_ssl {
        "https" "on";
        default $https;
    }
    # Get 'PORT' from `$port` unless 'X-Forwarded-Port'
    # is set by the reverse proxy
    map $http_x_forwarded_port $qgis_port {
        "" $port;
        default $http_x_forwarded_port;
    }

    server {
        listen       80 default_server;
        listen       [::]:80 default_server;
        server_name  _;
        root         /usr/share/nginx/html;

        # --- CORS (job-0029) ----------------------------------------------
        # `always` flag is REQUIRED — nginx normally suppresses add_header
        # on non-2xx responses, but browsers need ACAO on 4xx/5xx too so
        # the fetch error surfaces correctly. Without `always`, an error
        # response from the FCGI mapserver would arrive header-less and
        # the browser would report a CORS failure instead of the real
        # status code.
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Origin,Content-Type,Accept,Authorization,X-Requested-With' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Type' always;
        add_header 'Access-Control-Max-Age' '86400' always;

        # Include optional server location configs (e.g., landing page)
        include /etc/nginx/qgis.d/*.conf;

        location /ogc/ {
            # Preflight handling — short-circuit CORS preflight at nginx
            # so it never reaches the FCGI mapserver. add_header above
            # already injects the CORS response headers on this 204.
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Origin,Content-Type,Accept,Authorization,X-Requested-With' always;
                add_header 'Access-Control-Max-Age' '86400' always;
                add_header 'Content-Type' 'text/plain; charset=utf-8' always;
                add_header 'Content-Length' '0' always;
                return 204;
            }
            rewrite ^/ogc/(.*)$ /qgis/qgis_mapserv.fcgi?map=/io/data/$1/$1.qgs;
        }
        # Direct access without map rewrite
        location /ows/ {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Origin,Content-Type,Accept,Authorization,X-Requested-With' always;
                add_header 'Access-Control-Max-Age' '86400' always;
                add_header 'Content-Type' 'text/plain; charset=utf-8' always;
                add_header 'Content-Length' '0' always;
                return 204;
            }
            rewrite ^/ows/$ /qgis/qgis_mapserv.fcgi;
        }
        location /wfs3/ {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Origin,Content-Type,Accept,Authorization,X-Requested-With' always;
                add_header 'Access-Control-Max-Age' '86400' always;
                add_header 'Content-Type' 'text/plain; charset=utf-8' always;
                add_header 'Content-Length' '0' always;
                return 204;
            }
            rewrite ^/wfs3/(.*)$ /qgis/qgis_mapserv.fcgi;
        }
        location /qgis/ {
            internal; # Used only by the OGC rewrite
            root /var/www/data;
            fastcgi_pass  localhost:9993;

            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param QUERY_STRING    $query_string;
            # build links in GetCapabilities based on
            # the hostname exposed by the reverse proxy
            fastcgi_param  HTTPS $qgis_ssl;
            fastcgi_param  SERVER_NAME $qgis_host;
            fastcgi_param  SERVER_PORT $qgis_port;
            include fastcgi_params;

            # Re-assert CORS headers on the FCGI-served response. Nginx
            # `add_header` does NOT inherit from outer scopes when this
            # block defines its own — and the FCGI response is where the
            # real WMS bytes come from, so the headers must be re-stated.
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin,Content-Type,Accept,Authorization,X-Requested-With' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Type' always;
            add_header 'Access-Control-Max-Age' '86400' always;
        }
        error_page 404 /404.html;
            location = /40x.html {
        }
        error_page 500 502 503 504 /50x.html;
            location = /50x.html {
        }
    }

}
